name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # Doxygen is required to parse the C/C++ ECU code via mkdoxy
      - name: Install Doxygen
        run: sudo apt-get update && sudo apt-get install -y doxygen

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          # Downgrade to 3.11 or 3.12 for better plugin stability
          python-version: '3.12' 

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install "mkdocs<2.0" mkdocs-material mkdocs-material-extensions pymdown-extensions mkdocs-callouts mkdocs-roamlinks-plugin mkdocs-multirepo-plugin mkdoxy

      # Questa riga è quella che risolve l'errore di autenticazione
      - name: Configure Git for private repositories
        run: |
          git config --global url."https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/".insteadOf "https://github.com/"

      - name: Build and deploy
        run: python -m mkdocs gh-deploy --force