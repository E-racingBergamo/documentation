name: Deploy Global Documentation

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    # IMPORTANTE: Permessi necessari per leggere altri repository
    permissions:
      contents: read
      pages: write
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Doxygen
        run: sudo apt-get update && sudo apt-get install -y doxygen

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install "mkdocs<2.0" mkdocs-material mkdocs-material-extensions pymdown-extensions mkdocs-callouts mkdocs-roamlinks-plugin mkdocs-multirepo-plugin mkdoxy

      # Questa configurazione forza Git a usare il token per ogni clone/fetch
      - name: Configure Git for private repositories and PUSH
        run: |
          # Questa configurazione ora copre sia il READ (multirepo) che il WRITE (gh-deploy)
          git config --global url."https://x-access-token:${{ secrets.MY_ACCESS_TOKEN }}@github.com/".insteadOf "https://github.com/"
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"

      - name: Build and deploy
        # Rimuoviamo il push automatico di gh-deploy e usiamo un approccio più robusto
        # che rispetta le configurazioni Git che abbiamo appena impostato
        run: python -m mkdocs gh-deploy --force --remote origin